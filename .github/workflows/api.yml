name: Deploy API Desenvolvimento
on:
  push:
    branches: 
      - desenvolvimento
    paths:
      - 'services/tasks_api/**'
      - '.github/workflows/api.yml'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
  
jobs: 
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.14]
        poetry-version: [2.3.2]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: services/tasks_api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install "poetry>=2.1,<3" poetry-plugin-export

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests
        run: poetry run pytest tests.py --cov=./ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  code-quality:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.14]
        poetry-version: [2.3.2]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: services/tasks_api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install "poetry>=2.1,<3" poetry-plugin-export

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run black (autoformat)
        run: poetry run black .

      - name: Run isort (autoformat)
        run: poetry run isort . --profile black

      - name: Run flake8
        run: poetry run flake8 .

      - name: Run bandit
        run: poetry run bandit .

  deploy-desenvolvimento:
    needs: [ test, code-quality ]
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.14]
        poetry-version: [2.3.2]
        node-version: [22]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: services/tasks_api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install "poetry>=2.1,<3" poetry-plugin-export

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Install NPM dependencies
        run: npm install

      - name: Create .env.desenvolvimento file
        run: |
          cat <<EOF > .env.desenvolvimento
          APP_ENVIRONMENT=${{ secrets.STAGE_DEV }}
          AWS_DEFAULT_REGION=${{ secrets.REGION }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS_DEV }}
          EOF
        working-directory: services/tasks_api

      - name: Deploy Desenvolvimento
        env:
          STAGE: ${{ secrets.STAGE_DEV }}
          REGION: ${{ secrets.REGION }}
        run: sls deploy --stage $STAGE --region $REGION --verbose